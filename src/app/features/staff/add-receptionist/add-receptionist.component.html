<div class="w-full">
  <div class="mb-8">
    <h1 class="text-2xl font-bold tracking-tight text-[var(--color-text)] sm:text-3xl">
      {{ 'add_receptionist.title' | translate }}
    </h1>
    <p class="mt-1 text-sm text-[var(--color-muted)]">
      Add a new receptionist to the clinic system.
    </p>
  </div>

  <form
    [formGroup]="receptionistForm"
    (ngSubmit)="onSubmit()"
    class="flex w-full flex-col gap-6 rounded-3xl bg-[var(--color-surface)] p-6 shadow-sm sm:p-10"
  >
    <!-- Full Name -->
    <app-input
      formControlName="displayName"
      [label]="'add_doctor.full_name' | translate"
      [error]="
        displayName!.invalid && displayName!.touched
          ? ('add_doctor.full_name_required' | translate)
          : null
      "
    ></app-input>

    <!-- Email -->
    <app-input
      formControlName="email"
      type="email"
      [label]="'add_doctor.email' | translate"
      [error]="
        email!.invalid && email!.touched
          ? email!.errors?.['required']
            ? ('add_doctor.email_required' | translate)
            : ('add_doctor.invalid_email' | translate)
          : null
      "
    ></app-input>

    <!-- Phone -->
    <app-input
      formControlName="phone"
      [label]="'add_doctor.phone' | translate"
      [error]="phone!.invalid && phone!.touched ? ('add_doctor.phone_required' | translate) : null"
    ></app-input>

    <!-- Temporary Password -->
    <app-input
      formControlName="password"
      type="password"
      [label]="'add_doctor.temp_password' | translate"
      [error]="
        password!.invalid && password!.touched
          ? password!.errors?.['required']
            ? ('add_doctor.password_required' | translate)
            : ('add_doctor.password_min' | translate)
          : null
      "
    ></app-input>

    <div class="mt-4 flex justify-end">
      <app-button type="submit" [disabled]="isLoading()">
        {{
          isLoading()
            ? ('add_receptionist.creating' | translate)
            : ('add_receptionist.create' | translate)
        }}
      </app-button>
    </div>
  </form>
</div>
