<div class="space-y-8">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-2xl font-bold text-[var(--color-text)] sm:text-4xl">
        {{ 'staff.title' | translate }}
      </h1>
      <p class="mt-1 text-sm text-[var(--color-muted)]">{{ 'staff.subtitle' | translate }}</p>
    </div>

    <div class="flex shrink-0 gap-3">
      <app-button (clicked)="goToAddDoctor()">
        {{ 'staff.add_doctor' | translate }}
      </app-button>

      <app-button
        (clicked)="goToAddreciptionist()"
        customClass="border border-[var(--color-border)] bg-[var(--color-surface)] px-5 py-2.5 transition hover:bg-[var(--color-surface-2)] text-[var(--color-text)]"
      >
        {{ 'staff.add_receptionist' | translate }}
      </app-button>
    </div>
  </div>

  <app-data-table [data]="staffList()" [columns]="columns" [isLoading]="isLoading()">
  </app-data-table>
</div>
