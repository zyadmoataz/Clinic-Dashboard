<div class="mx-auto max-w-3xl px-4 py-8">
  <h1 class="mb-6 text-3xl font-bold text-gray-900 dark:text-white">Add doctor</h1>

  <form [formGroup]="doctorForm" (ngSubmit)="onSubmit()">
    <div
      class="flex flex-col gap-6 rounded-2xl border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800"
    >
      <!-- ── Account Section ── -->
      <p class="text-sm font-medium text-gray-400">Account</p>

      <div class="grid grid-cols-2 gap-4">
        <!-- Full Name -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300"> Full name </label>
          <input
            formControlName="displayName"
            type="text"
            class="rounded-lg border px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
            [class.border-red-500]="displayName?.invalid && displayName?.touched"
            [class.border-gray-300]="!(displayName?.invalid && displayName?.touched)"
          />
          <p *ngIf="displayName?.invalid && displayName?.touched" class="text-xs text-red-500">
            Full name is required
          </p>
        </div>

        <!-- Email -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300"> Email </label>
          <input
            formControlName="email"
            type="email"
            class="rounded-lg border px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
            [class.border-red-500]="email?.invalid && email?.touched"
            [class.border-gray-300]="!(email?.invalid && email?.touched)"
          />
          <p *ngIf="email?.invalid && email?.touched" class="text-xs text-red-500">
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Invalid email</span>
          </p>
        </div>

        <!-- Phone -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300"> Phone </label>
          <input
            formControlName="phone"
            type="text"
            class="rounded-lg border px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
            [class.border-red-500]="phone?.invalid && phone?.touched"
            [class.border-gray-300]="!(phone?.invalid && phone?.touched)"
          />
          <p *ngIf="phone?.invalid && phone?.touched" class="text-xs text-red-500">
            Phone is required
          </p>
        </div>

        <!-- Temporary Password -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">
            Temporary password
          </label>
          <input
            formControlName="password"
            type="password"
            class="rounded-lg border px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
            [class.border-red-500]="password?.invalid && password?.touched"
            [class.border-gray-300]="!(password?.invalid && password?.touched)"
          />
          <p *ngIf="password?.invalid && password?.touched" class="text-xs text-red-500">
            <span *ngIf="password?.errors?.['required']">Password is required</span>
            <span *ngIf="password?.errors?.['minlength']">Min 6 characters</span>
          </p>
        </div>
      </div>

      <!-- ── Profile Section ── -->
      <p class="mt-2 text-sm font-medium text-gray-400">Profile</p>

      <div class="grid grid-cols-2 gap-4">
        <!-- Specialty -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300"> Specialty </label>
          <input
            formControlName="specialty"
            type="text"
            class="rounded-lg border px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
            [class.border-red-500]="specialty?.invalid && specialty?.touched"
            [class.border-gray-300]="!(specialty?.invalid && specialty?.touched)"
          />
          <p *ngIf="specialty?.invalid && specialty?.touched" class="text-xs text-red-500">
            Specialty is required
          </p>
        </div>

        <!-- Photo URL -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">
            Photo URL
            <span class="font-normal text-gray-400">(optional)</span>
          </label>
          <input
            formControlName="photoUrl"
            type="text"
            class="rounded-lg border border-gray-300 px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
          />
        </div>
      </div>

      <!-- Bio -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">
          Bio
          <span class="font-normal text-gray-400">(optional)</span>
        </label>
        <input
          formControlName="bio"
          type="text"
          class="rounded-lg border border-gray-300 px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
        />
      </div>

      <!-- ── Weekly Availability ── -->
      <div class="mt-2 flex items-center justify-between">
        <p class="text-base font-semibold text-gray-900 dark:text-white">Weekly availability</p>
        <button
          type="button"
          (click)="addWindow()"
          class="flex items-center gap-1 rounded-lg border border-teal-600 px-3 py-1.5 text-sm font-medium text-teal-600 transition hover:border-teal-700 hover:text-teal-700"
        >
          + Add window
        </button>
      </div>

      <!-- Availability Rows -->
      <div formArrayName="availability" class="flex flex-col gap-3">
        <div
          *ngFor="let window of availability.controls; let i = index"
          [formGroupName]="i"
          class="flex items-center gap-3"
        >
          <!-- Day -->
          <select
            formControlName="dayOfWeek"
            class="w-40 rounded-lg border border-gray-300 px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
          >
            <option *ngFor="let day of days" [value]="day.value">
              {{ day.label }}
            </option>
          </select>

          <!-- Start Time -->
          <input
            formControlName="startTime"
            type="time"
            class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
          />

          <!-- End Time -->
          <input
            formControlName="endTime"
            type="time"
            class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm transition focus:ring-2 focus:ring-teal-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white"
          />

          <!-- Delete -->
          <button
            type="button"
            (click)="removeWindow(i)"
            class="p-1 text-gray-400 transition hover:text-red-500"
          >
            🗑
          </button>
        </div>
      </div>

      <!-- ── Submit ── -->
      <div class="mt-2">
        <button
          type="submit"
          [disabled]="isLoading"
          class="rounded-lg bg-teal-600 px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-700 disabled:opacity-50"
        >
          {{ isLoading ? 'Creating...' : 'Create doctor' }}
        </button>
      </div>
    </div>
  </form>
</div>
