<div class="w-full">
  <app-page-header
    [title]="'header.profile' | translate"
    [description]="'profile.subtitle' | translate"
  ></app-page-header>

  <div class="mt-8 flex w-full flex-col gap-8 md:flex-row md:items-start">
    <!-- Left Side: Profile Card -->
    <div
      class="flex w-full flex-col items-center rounded-3xl bg-[var(--color-surface)] p-8 shadow-sm md:w-1/3"
    >
      @if (loading()) {
        <app-loading />
      } @else {
        <div
          class="ring-border mb-6 rounded-full p-2 ring-1 transition-all hover:ring-slate-300 dark:ring-slate-700 dark:hover:ring-slate-500"
        >
          <app-avatar [name]="currentUser()?.role || 'Guest'" size="lg"></app-avatar>
        </div>
        <h2 class="text-xl font-bold tracking-tight text-[var(--color-text)] capitalize">
          {{ currentUser()?.role }}
        </h2>
        <p class="mb-6 text-sm text-[var(--color-muted)]">{{ currentUser()?.email }}</p>
      }
    </div>

    <!-- Right Side: Edit Form -->
    <div class="flex w-full flex-col rounded-3xl bg-[var(--color-surface)] p-8 shadow-sm md:w-2/3">
      <div class="mb-8 border-b border-slate-100 pb-5 dark:border-slate-800">
        <h3 class="text-lg font-bold text-[var(--color-text)]">
          {{ 'profile.personal_info' | translate }}
        </h3>
      </div>

      @if (loading()) {
        <app-loading />
      } @else {
        <form [formGroup]="profileForm" class="flex flex-col gap-6">
          <app-input
            label="profile.email"
            type="email"
            formControlName="email"
            [placeholder]="'profile.email' | translate"
          ></app-input>

          <div class="flex flex-col gap-1.5">
            <label class="mb-1 text-sm font-semibold text-[var(--color-text)]">{{
              'profile.role' | translate
            }}</label>
            <input
              type="text"
              [value]="currentUser()?.role"
              disabled
              class="cursor-not-allowed rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-[var(--color-muted)] capitalize dark:border-slate-700 dark:bg-[var(--color-surface-2)]"
            />
          </div>
        </form>
      }
    </div>
  </div>
</div>
