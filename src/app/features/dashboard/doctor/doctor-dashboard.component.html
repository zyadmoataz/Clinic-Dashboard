<div class="mx-auto flex max-w-[var(--container)] flex-col gap-6 p-6">
  <!-- Header -->
  <div>
    <h1 class="text-2xl font-bold tracking-tight text-[var(--color-text)]">My schedule</h1>
    <p *ngIf="!loading && !error" class="mt-1 text-sm text-[var(--color-muted)]">
      {{ todayLabel }} · {{ patientCount }} patient{{ patientCount !== 1 ? 's' : '' }}
    </p>
  </div>

  <!-- Skeleton -->
  <ng-container *ngIf="loading">
    <div
      *ngFor="let i of [1, 2, 3]"
      class="mb-3 h-20 animate-pulse rounded-[var(--radius)] bg-[var(--color-surface-2)]"
    ></div>
  </ng-container>

  <!-- Error -->
  <div
    *ngIf="error && !loading"
    class="flex flex-col items-center gap-3 py-12 text-sm text-[var(--color-muted)]"
  >
    <svg
      width="32"
      height="32"
      viewBox="0 0 24 24"
      fill="none"
      stroke="var(--color-danger)"
      stroke-width="1.5"
    >
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
    <p>Could not load your schedule. Please refresh.</p>
  </div>

  <!-- Schedule -->
  <div
    *ngIf="!loading && !error"
    class="overflow-hidden rounded-[var(--radius)] border border-[var(--color-border)] bg-[var(--color-surface)] shadow-[var(--shadow-sm)]"
  >
    <ng-container *ngIf="appointments.length > 0; else noSchedule">
      <div
        *ngFor="let appt of appointments"
        class="flex items-center gap-4 border-b border-[var(--color-border)] px-5 py-4 transition-colors duration-[var(--transition-fast)] last:border-b-0 hover:bg-[var(--color-bg)]"
      >
        <span class="w-12 shrink-0 text-sm font-semibold text-[var(--color-text)]">{{
          appt.timeSlot
        }}</span>

        <div class="flex-1 border-l-2 border-[var(--color-primary-soft)] pl-3.5">
          <p class="text-sm font-semibold text-[var(--color-text)]">{{ appt.patientName }}</p>
          <p class="text-xs text-[var(--color-muted)]">{{ appt.serviceName }}</p>
        </div>

        <div class="flex shrink-0 items-center gap-2">
          <span
            class="rounded-[var(--radius-full)] px-2.5 py-1 text-xs font-semibold"
            [ngClass]="statusClass(appt.status)"
          >
            {{ statusLabel(appt.status) }}
          </span>

          <button
            *ngIf="canStartVisit(appt.status)"
            (click)="startVisit(appt)"
            class="rounded-[var(--radius-sm)] bg-[var(--color-primary)] px-3 py-1.5 text-xs font-semibold text-[var(--color-on-primary)] shadow-[var(--shadow-glow-soft)] transition-all duration-[var(--transition-fast)] hover:bg-[var(--color-primary-hover)]"
          >
            Start visit
          </button>

          <button
            *ngIf="canOpen(appt.status)"
            (click)="openAppointment(appt)"
            class="rounded-[var(--radius-sm)] border border-[var(--color-border-strong)] px-3 py-1.5 text-xs font-semibold text-[var(--color-text)] transition-all duration-[var(--transition-fast)] hover:border-[var(--color-primary)] hover:bg-[var(--color-primary-soft)] hover:text-[var(--color-primary)]"
          >
            Open
          </button>

          <a
            *ngIf="canViewNotes(appt.status)"
            routerLink="/visit-notes/{{ appt.id }}"
            class="text-xs font-semibold text-[var(--color-primary)] hover:underline"
          >
            View notes
          </a>
        </div>
      </div>
    </ng-container>

    <ng-template #noSchedule>
      <div class="flex flex-col items-center gap-2 py-12 text-sm text-[var(--color-faint)]">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <p>No appointments scheduled for today.</p>
      </div>
    </ng-template>
  </div>
</div>
