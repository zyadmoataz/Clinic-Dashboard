@switch (role()) {
  @case ('admin') {
    <app-admin-dashboard />
  }
  @case ('receptionist') {
    <app-receptionist-dashboard />
  }
  @case ('doctor') {
    <app-doctor-dashboard />
  }
  @default {
    <div class="flex h-full items-center justify-center p-12 text-sm text-[var(--color-muted)]">
      No dashboard available for your role.
    </div>
  }
}
