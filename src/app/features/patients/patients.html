<div class="px-6 py-8">
  <div class="mb-6 flex items-start justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Patients</h1>
      <p class="mt-1 text-sm text-gray-500">Register and search patients.</p>
    </div>
    <app-button (clicked)="toggleForm()">
      {{ showForm ? 'Cancel' : '+ Add patient' }}
    </app-button>
  </div>

  <div class="mb-6">
    <app-search-input (search)="onSearch($event)" />
  </div>

  <div *ngIf="isLoading" class="py-10 text-center text-gray-400">Loading...</div>

  <div
    *ngIf="!isLoading"
    class="overflow-hidden rounded-2xl border border-gray-200 bg-white dark:border-gray-700 dark:bg-gray-800"
  >
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-gray-200 bg-gray-50 dark:border-gray-600 dark:bg-gray-700">
          <th
            class="px-6 py-3 text-left text-xs font-semibold tracking-wider text-gray-500 uppercase"
          >
            Name
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold tracking-wider text-gray-500 uppercase"
          >
            Phone
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold tracking-wider text-gray-500 uppercase"
          >
            Email
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold tracking-wider text-gray-500 uppercase"
          >
            Account
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
        <tr *ngIf="filteredPatients.length === 0">
          <td colspan="4" class="py-10 text-center text-gray-400">No patients found.</td>
        </tr>
        <tr
          *ngFor="let patient of filteredPatients"
          class="transition-colors hover:bg-gray-50 dark:hover:bg-gray-700/50"
        >
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">
            {{ patient.name }}
          </td>
          <td class="px-6 py-4 text-gray-600 dark:text-gray-300">
            {{ patient.phone }}
          </td>
          <td class="px-6 py-4 text-teal-600 dark:text-teal-400">
            {{ patient.email }}
          </td>
          <td class="px-6 py-4">
            <span
              *ngIf="patient.email?.includes('clinic.local'); else registered"
              class="rounded-full bg-gray-100 px-3 py-1 text-xs font-medium text-gray-600"
            >
              Walk-in
            </span>
            <ng-template #registered>
              <span class="rounded-full bg-teal-50 px-3 py-1 text-xs font-medium text-teal-700">
                Registered
              </span>
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
